# ==========================================================================
# CRE WORKFLOW SETTINGS: azura-review-proposals
# ==========================================================================
# Event-triggered workflow that listens for ProposalCreated events on
# AzuraKillStreak. When a new proposal appears, it calls the Eliza AI API
# for scoring, computes the azuraLevel (0-4), and submits a DON-signed review
# on-chain via onReport().

production-settings:
  user-workflow:
    workflow-name: "azura-review-proposals"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"

staging-settings:
  user-workflow:
    workflow-name: "azura-review-proposals-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
