# ==========================================================================
# CRE WORKFLOW SETTINGS: blue-review-proposals
# ==========================================================================
# Event-triggered workflow that listens for ProposalCreated events on
# BlueKillStreak. When a new proposal appears, it calls the Eliza AI API
# for scoring, computes the blueLevel (0-4), and submits a DON-signed review
# on-chain via onReport().

production-settings:
  user-workflow:
    workflow-name: "blue-review-proposals"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"

staging-settings:
  user-workflow:
    workflow-name: "blue-review-proposals-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
