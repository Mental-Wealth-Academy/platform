## Chainlink CRE Project Configuration
## Mental Wealth Academy — Governance Automation Workflows

production-settings:
  account:
    workflow-owner-address: "{{WORKFLOW_OWNER_ADDRESS}}"
  rpcs:
    - chain-name: base-mainnet
      url: "{{BASE_RPC_URL}}"
  forwarder:
    chain-name: base-mainnet
    address: "{{KEYSTONE_FORWARDER_ADDRESS}}"

staging-settings:
  account:
    workflow-owner-address: "{{WORKFLOW_OWNER_ADDRESS}}"
  rpcs:
    - chain-name: base-sepolia
      url: "{{BASE_SEPOLIA_RPC_URL}}"
  forwarder:
    chain-name: base-sepolia
    address: "{{KEYSTONE_FORWARDER_ADDRESS_SEPOLIA}}"
