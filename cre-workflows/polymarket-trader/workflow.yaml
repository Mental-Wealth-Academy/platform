# ==========================================================================
# CRE WORKFLOW SETTINGS: polymarket-auto-trader
# ==========================================================================
# Cron-triggered workflow that scans Polymarket every 30 minutes for
# mispriced markets using Anthropic Claude + Bayesian decision framework.
# Applies quarter-Kelly sizing and submits trades via AzuraMarketTrader.
#
# Decision pipeline:
#   1. EV tells you whether to act
#   2. Base rates ground estimates in reality
#   3. Sunk costs tell you what to ignore
#   4. Bayes tells you how to update
#   5. Survivorship bias tells you what's missing
#   6. Quarter-Kelly tells you how much to commit

production-settings:
  user-workflow:
    workflow-name: "polymarket-auto-trader"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"

staging-settings:
  user-workflow:
    workflow-name: "polymarket-auto-trader-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
