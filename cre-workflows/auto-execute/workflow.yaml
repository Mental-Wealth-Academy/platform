name: auto-execute-proposals
description: >
  Cron workflow that runs every 10 minutes, reads active proposals from
  AzuraKillStreak, and auto-executes any that have passed the 50% vote
  threshold.  Delivers a DON-signed report via KeystoneForwarder.

trigger:
  type: cron
  schedule: "*/10 * * * *"

entry: main.ts
