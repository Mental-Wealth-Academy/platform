# ==========================================================================
# CRE WORKFLOW SETTINGS: auto-execute-proposals
# ==========================================================================
# Cron workflow that runs every 10 minutes, reads active proposals from
# BlueKillStreak, and auto-executes any that have passed the 50% vote
# threshold. Delivers a DON-signed report via KeystoneForwarder.

production-settings:
  user-workflow:
    workflow-name: "auto-execute-proposals"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"

staging-settings:
  user-workflow:
    workflow-name: "auto-execute-proposals-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
