version: "3.8"

services:
  blue:
    build:
      context: .
      dockerfile: blue-server/Dockerfile
    container_name: blue-os
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
